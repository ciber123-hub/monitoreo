    <div class="admin-header">
      <h1 class="admin-title">Administración de Usuarios</h1>
    </div>

    <div class="admin-section">

      <div class="users-table-wrapper">
        <table class="users-table">

    <thead>
      <tr>
        <th>Usuario</th>
        <th>Perfil</th>
        <th>Estado</th>
        <th class="actions-col">Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let user of usersList()" [class.inactive]="!user.activo">

        <td class="user-cell">
          <div class="user-info">
            <div class="avatar">
              {{ user.usuario.charAt(0).toUpperCase() }}
            </div>
            <span>{{ user.usuario }}</span>
          </div>
        </td>

        <td>
          <select class="profile-select"
                  [(ngModel)]="user.perfil"
                  (change)="onUpdateUserProfile(user)"
                  [disabled]="!user.activo">
            <option value="Soporte">Soporte</option>
            <option value="Admin">Admin</option>
            
          </select>
        </td>

        <td>
          <div class="status-toggle">
            <p-toggleSwitch
              [ngModel]="user.activo"
              (onChange)="onToggleUserActive(user, $event.checked)"
              onLabel="Activo"
              offLabel="Inactivo"
              onIcon="pi pi-check"
              offIcon="pi pi-times"
            ></p-toggleSwitch>
          </div>
        </td>

        <td class="actions">
          <button
            class="btn-delete"
            (click)="onDeleteUser(user)"
            [disabled]="!user.activo"
            pTooltip="Eliminar"
            tooltipPosition="top"
            type="button"
          >
            🗑
          </button>
        </td>

      </tr>
    </tbody>

  </table>

        <div *ngIf="usersList().length === 0" class="no-data">
          No hay usuarios registrados
        </div>
      </div>

    </div>
  </div>
</div>
