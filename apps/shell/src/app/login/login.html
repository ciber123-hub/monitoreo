<div class="login-container">
  <div class="logo-outside-card">
     <img src="assets/images/logo_blanco.png" alt="Gobierno de México" class="logo-img" >
    <img src="assets/images/LOGO-FNPTE.png" alt="FNPTE" class="logo-img-fnpte">
    <div class="login-card">
      <div class="logo-section">
        <h2>Sistema de Monitoreo</h2>
      </div>
      <div class="btn-container">
        <button
          pButton
          type="button"
          label="Iniciar sesión"
          (click)="login()"
          aria-label="Iniciar sesión"
        ></button>
      </div>
    </div>
  </div>
</div>

<!-- Unauthorized Access Dialog -->
<p-dialog
  header="Acceso No Autorizado"
  [(visible)]="showUnauthorizedDialog"
  [modal]="true"
  [closable]="false"
  [draggable]="false"
  [resizable]="false"
  [style]="{'max-width': '150px', 'width': '50%'}"
  styleClass="unauthorized-dialog">
  <div class="dialog-content">
    <div class="warning-icon">
      <i class="pi pi-exclamation-triangle"></i>
    </div>
    <div class="message-text">
      <p><strong>Usuario no registrado en el sistema.</strong></p>
      <p>Contacte al administrador para obtener acceso.</p>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button
      label="Aceptar"
      (onClick)="onUnauthorizedDialogClose()"
      styleClass="p-button-primary">
    </p-button>
  </ng-template>
</p-dialog>
